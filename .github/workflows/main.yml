name: Calculator Test and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run Tests
        run: |
          pytest --cov=calc --cov-report=term --cov-report=html --cov-fail-under=80

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage
          path: htmlcov/

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - run: echo "Coverage passed. Deployment successful!"