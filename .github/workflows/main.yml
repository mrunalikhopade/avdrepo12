name: GitHub Action Demo Pipeline

on:
  push:
    branches:
      - main

jobs:
  extract-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pandas
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Show Python version
        run: python --version

      - name: Run extract.py
        run: python extract.py